events {}

http {
  upstream frontend_upstream {
    server frontend:80;
  }

  upstream auth_service_upstream {
    server auth_service:8000;
  }

  upstream user_service_upstream {
    server user_service:8000;
  }

  upstream product_service_upstream {
    server product_service:8000;
  }

  upstream order_service_upstream {
    server order_service:8000;
  }

  upstream chat_service_upstream {
    server chat_service:8000;
  }

  server {
    listen 80;
    server_name _;

    location /api/auth/ {
      proxy_pass http://auth_service_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/users/ {
      proxy_pass http://user_service_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/products/ {
      proxy_pass http://product_service_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/orders/ {
      proxy_pass http://order_service_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/chat/ {
      proxy_pass http://chat_service_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}

